apiVersion: aws.platformref.upbound.io/v1alpha1
kind: Cluster
metadata:
  name: platform-ref-aws
  namespace: default
  labels:
    platform.upbound.io/deletion-ordering: enabled
spec:
  parameters:
    id: platform-ref-aws
    region: us-west-2
    version: "1.32"
    nodes:
      count: 3
      size: small
    gitops:
      git:
        url: https://github.com/upbound/platform-ref-aws/
        path: "/"
        ref:
          name: refs/heads/main
