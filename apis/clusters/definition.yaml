apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: clusters.aws.platformref.upbound.io
spec:
  group: aws.platformref.upbound.io
  names:
    categories:
    - crossplane
    kind: Cluster
    plural: clusters
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        type: object
        description: >-
          Cluster is the platform API application teams consume: a fully
          configured Kubernetes cluster with networking, ingress, observability
          and GitOps. It expresses what consumers vary and stays silent about how
          it is delivered.
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                description: Cluster configuration parameters.
                properties:
                  id:
                    type: string
                    description: Platform identifier other objects use to reference this cluster.
                  region:
                    type: string
                    description: Cloud region, e.g. us-west-2.
                  version:
                    type: string
                    enum: ["1.33", "1.32", "1.31"]
                    default: "1.32"
                    description: Kubernetes version.
                  nodes:
                    type: object
                    description: Worker node intent.
                    properties:
                      count:
                        type: integer
                        description: Desired node count.
                      size:
                        type: string
                        enum: [small, medium, large]
                        default: small
                        description: >-
                          Node capacity intent; the platform maps it to the right
                          instance type. Consumers express capacity, never a
                          provider instance type.
                    required:
                    - count
                  adminPrincipals:
                    type: array
                    items:
                      type: string
                    description: >-
                      Cloud principals (e.g. IAM role/user ARNs) granted
                      cluster-admin. "Who can administer this cluster" is consumer
                      intent; the access wiring is owned by the platform.
                  reclaimPolicy:
                    type: string
                    enum: [Delete, Retain]
                    default: Delete
                    description: >-
                      Outcome intent, using the Kubernetes PersistentVolume
                      vocabulary. Retain leaves cloud resources in place when this
                      cluster is deleted. The mapping to Crossplane management
                      policies is an implementation detail; this field does not
                      echo Crossplane machinery.
                  gitops:
                    type: object
                    description: >-
                      GitOps source the cluster bootstraps from. The platform
                      installs and tunes the GitOps engine; the consumer supplies
                      only the repository to deploy from.
                    properties:
                      git:
                        type: object
                        properties:
                          url:
                            type: string
                            pattern: ^(http|https|ssh)://.*$
                            description: Git repository URL (HTTP/S or SSH).
                          path:
                            type: string
                            default: "/"
                            description: Path within the repository to sync.
                          ref:
                            type: object
                            description: Git reference to resolve and monitor.
                            properties:
                              name:
                                type: string
                                description: 'Git reference, e.g. "refs/heads/main".'
                        required:
                        - url
                        - ref
                    required:
                    - git
                  overrides:
                    type: object
                    description: >-
                      Bounded escape hatch with an explicit support boundary, so
                      operational edge cases have a sanctioned outlet instead of
                      forcing leaks into the primary contract.
                    properties:
                      providerConfigName:
                        type: string
                        description: >-
                          Crossplane ProviderConfig for account/credential
                          selection. Defaults to "default".
                      operators:
                        type: object
                        description: >-
                          Pin platform operator (Flux/Prometheus) chart versions.
                          Normally platform-managed; override only when required.
                        properties:
                          flux:
                            type: object
                            properties:
                              version:
                                type: string
                          fluxSync:
                            type: object
                            properties:
                              version:
                                type: string
                          prometheus:
                            type: object
                            properties:
                              version:
                                type: string
                required:
                - id
                - region
                - nodes
                - gitops
            required:
            - parameters
          status:
            type: object
            properties:
              clusterName:
                type: string
                description: The cluster's name in the cloud.
        required:
        - spec
